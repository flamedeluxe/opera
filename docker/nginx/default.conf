server {
    listen 80;
    server_name localhost;
    charset utf-8;
    root /var/www/bitrix;
    index index.php index.html bitrixsetup.php;

    client_max_body_size 256M;

    location ^~ /balet_na_baikale/ {
        try_files $uri $uri/index.html =404;
    }

    # Если нет каталога с index.php под URL, не уводить в корневой index.php (главная).
    # Без ^~ — чтобы regex location для PHP имел приоритет над вложенными .php файлами.
    location /afisha/ {
        try_files $uri $uri/ /afisha/_route.php$is_args$args;
    }

    location / {
        try_files $uri $uri/ /uuopera_route.php$is_args$args;
    }

    location ~ ^/(restore\.php|bitrix/admin/1c_exchange\.php)$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 21600;
        fastcgi_send_timeout 21600;
        client_body_buffer_size 128m;
        client_max_body_size 1024m;
    }

    # Фото из WP-uploads: сначала локальный файл, иначе — прокси на прод
    location /wp-content/uploads/ {
        try_files $uri @wp_uploads_proxy;
        expires 30d;
        add_header Cache-Control public;
        access_log off;
    }
    location @wp_uploads_proxy {
        proxy_pass https://uuopera.ru;
        proxy_set_header Host uuopera.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 7d;
        expires 30d;
        add_header Cache-Control public;
        add_header X-Proxy-Origin uuopera.ru;
        access_log off;
    }

    location ~* ^.+\.(jpg|jpeg|gif|png|svg|webp|js|css|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control public;
        access_log off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }
}
