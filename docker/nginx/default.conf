server {
    listen 80;
    server_name localhost;
    charset utf-8;
    root /var/www/bitrix;
    index index.php index.html bitrixsetup.php;

    client_max_body_size 256M;

    # Если нет каталога с index.php под URL, не уводить в корневой index.php (главная).
    # Без ^~ — чтобы regex location для PHP имел приоритет над вложенными .php файлами.
    location /afisha/ {
        try_files $uri $uri/ /afisha/_route.php$is_args$args;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/(restore\.php|bitrix/admin/1c_exchange\.php)$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 21600;
        fastcgi_send_timeout 21600;
        client_body_buffer_size 128m;
        client_max_body_size 1024m;
    }

    location ~* ^.+\.(jpg|jpeg|gif|png|svg|webp|js|css|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control public;
        access_log off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }
}
